<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Monstrarium of Representation</title>
<meta name="description" content="An illustrated codex of concepts, emotions, and disorders given form — each an idea made flesh. Turn the pages of the Monstrarium." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Cinzel:wght@500;600;700&family=UnifrakturMaguntia&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css?v=20260618b" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23120d08'/%3E%3Cpath d='M16 4 L20 12 L28 12 L21 18 L24 27 L16 21 L8 27 L11 18 L4 12 L12 12 Z' fill='none' stroke='%23c9a14a' stroke-width='1.5'/%3E%3Ccircle cx='16' cy='15' r='3' fill='%23c9a14a'/%3E%3C/svg%3E" />
</head>
<body>

<!-- Ambient vignette + dust -->
<div class="ambient" aria-hidden="true">
  <div class="ambient__vignette"></div>
  <div class="ambient__dust" id="dustLayer"></div>
</div>

<!-- Sound + controls -->
<div class="hud" aria-hidden="false">
  <button class="hud__btn" id="galleryBtn" title="View all plates in a gallery">
    <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.6" fill="none"/><rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.6" fill="none"/><rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.6" fill="none"/><rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.6" fill="none"/></svg>
    <span class="hud__label">Gallery</span>
  </button>
  <button class="hud__btn" id="soundBtn" aria-pressed="false" title="Toggle ambient sound">
    <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path class="snd-on" d="M4 9v6h4l5 4V5L8 9H4z" fill="currentColor"/><path class="snd-on" d="M16 8c1.5 1.2 1.5 6.8 0 8" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round"/><path class="snd-on" d="M18.5 5.5c3 2.6 3 10.4 0 13" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round"/></svg>
    <span class="hud__label">Sound</span>
  </button>
  <button class="hud__btn" id="fsBtn" title="Toggle fullscreen">
    <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round"/></svg>
    <span class="hud__label">Fullscreen</span>
  </button>
</div>

<!-- The book stage: arrows flank the book on the left and right -->
<main class="stage" id="stage">
  <button class="nav__arrow nav__arrow--prev" id="prevBtn" aria-label="Previous page" disabled>
    <svg viewBox="0 0 24 24" width="30" height="30" aria-hidden="true"><path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>

  <div class="book" id="book" role="group" aria-roledescription="book" aria-label="Monstrarium of Representation, an interactive codex">
    <!-- pages injected by JS -->
  </div>

  <button class="nav__arrow nav__arrow--next" id="nextBtn" aria-label="Next page">
    <svg viewBox="0 0 24 24" width="30" height="30" aria-hidden="true"><path d="M9 5l7 7-7 7" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
</main>

<!-- Reading panel: a magnified view of the spot under the cursor,
     anchored to a side so it never covers what you are reading -->
<div class="reader" id="reader" aria-hidden="true"></div>

<!-- Gallery: every plate laid out in one grand grid, grouped by chapter.
     Click any plate to close the gallery and open the book to that page. -->
<div class="gallery" id="gallery" aria-hidden="true" role="dialog" aria-label="Gallery of all plates">
  <div class="gallery__bar">
    <div class="gallery__barhead">
      <div class="gallery__title">The Compleat Bestiary</div>
      <button class="gallery__close" id="galleryClose" type="button" aria-label="Close gallery">
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="gallery__tools">
      <div class="gallery__search">
        <svg class="gallery__searchicon" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><circle cx="11" cy="11" r="6.5" stroke="currentColor" stroke-width="1.6" fill="none"/><path d="M16 16l4.5 4.5" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round"/></svg>
        <input class="gallery__input" id="gallerySearch" type="search" placeholder="Search the bestiary…" aria-label="Search plates by name" autocomplete="off" spellcheck="false" />
        <button class="gallery__clear" id="gallerySearchClear" type="button" aria-label="Clear search" hidden>
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="gallery__chips" id="galleryChips" role="group" aria-label="Filter by chapter"><!-- chips injected by JS --></div>
    </div>
  </div>
  <div class="gallery__scroll" id="galleryScroll"><!-- grid injected by JS --></div>
  <div class="gallery__empty" id="galleryEmpty" hidden>No creatures answer to that name.</div>
</div>

<!-- Page-jump dots: a fixed marker to the cover, one dot per spread
     (chapter spreads marked with a gilt diamond), and a fixed marker to
     the back. Built by JS. -->
<nav class="pager" id="pager" aria-label="Jump to a page"></nav>

<!-- Quiet hint, fades away -->
<div class="hint" id="hint">Turn the pages with the arrows, the page corners, or your &larr; &rarr; keys</div>

<!-- Safety: if any stale service worker from a previous version is still
     registered in a visitor's browser, it can hijack the page and force an
     endless reload loop. This project has never used a service worker, so we
     proactively unregister any that exist and clear their caches once. -->
<script>
(function () {
  try {
    if ('serviceWorker' in navigator && navigator.serviceWorker.getRegistrations) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) { r.unregister(); });
      }).catch(function(){});
    }
    if (window.caches && caches.keys) {
      caches.keys().then(function (keys) {
        keys.forEach(function (k) { caches.delete(k); });
      }).catch(function(){});
    }
  } catch (e) { /* no-op */ }
})();
</script>
<script src="js/data.js?v=20260618b"></script>
<script src="js/audio.js?v=20260618b"></script>
<script src="js/book.js?v=20260618b"></script>
</body>
</html>
